name: Deploy to Contabo

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Hugo installieren
        run: |
          HUGO_VERSION="0.159.1"
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/
          hugo version

      - name: Hugo Build
        run: |
          hugo --minify
          # Prüfe ob Build Output vorhanden ist
          [ -f public/index.html ] || { echo "Build fehlgeschlagen: public/index.html fehlt"; exit 1; }

      - name: SSH-Key einrichten
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Per rsync auf Server deployen
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./public/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: SSH-Key aufräumen
        if: always()
        run: rm -f ~/.ssh/id_ed25519
