name: Deploy to Contabo

on:
  push:
    branches:
      - main
  schedule:
    # Täglicher Build für terminierte Posts (publishDate): 17:05 UTC = 19:05 MESZ
    # (18:05 MEZ im Winter). Ohne diesen Lauf erscheinen Posts mit publishDate
    # in der Zukunft erst beim nächsten Push.
    - cron: "5 17 * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH-Key einrichten
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Build auf Server triggern
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            build-online-resources

      - name: SSH-Key aufräumen
        if: always()
        run: rm -f ~/.ssh/id_ed25519
