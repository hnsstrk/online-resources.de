baseURL: "https://www.online-resources.de/"
languageCode: de-de
DefaultContentLanguage: de
title: online-resources.de
copyright: "© 2023–2026 online-resources.de"
pagination:
  pagerSize: 12
theme: rollenspiel

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

#googleAnalytics: UA-123-45

minify:
  disableXML: true
  minifyOutput: true

params:
  title: online-resources.de
  description: "Meine kleine Sammlung von Allem..."
  keywords: [Rollenspiel, RPG, Das Schwarze Auge, DSA5, Greifenfurter Adel, DSK, Die Schwarze Katze]
  author: hnsstrk
  # author: ["Me", "You"] # mehrere Autoren möglich
# DateFormat: "January 2, 2006"
  DateFormat: "02.01.2006"
  ShowFullTextinRSS: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowWordCount: true

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "https://online-resources.de/favicon/favicon.ico"
    favicon16x16: "https://online-resources.de/favicon/favicon-16x16.png"
    favicon32x32: "https://online-resources.de/favicon/favicon-32x32.png"
    apple_touch_icon: "https://online-resources.de/favicon/apple-touch-icon.png"

  # ----------------------------------------------------------------------------
  # Wordmark der Topbar — Brand-Text + italic em-Teil.
  # Default: "online" / "resources" → wird zu „online — resources"
  # ----------------------------------------------------------------------------
  brand:
    text: "online"
    em: "resources"

  # ----------------------------------------------------------------------------
  # Footer — drei Blöcke nebeneinander (1.6fr 1fr 1fr).
  # Jeder Block hat seine Überschrift und seinen Inhalt direkt darunter.
  # Blöcke ohne Inhalt (leere `items` / leerer `text`) werden ausgelassen.
  # HTML-Tags wie <em> und <br/> sind in Texten erlaubt.
  # ----------------------------------------------------------------------------
  footer:
    # Spalte 1 — Fließtext + Social-Row.
    colophon:
      heading: "Kolophon"
      text: >-
        Gesetzt in <em>Cormorant Garamond</em> und <em>EB Garamond</em>, mit
        Metadaten in <em>JetBrains Mono</em>. Illustrationen aus den laufenden
        Kampagnen von hnsstrk. Gebaut mit Hugo.

    # Spalte 2 — Service / funktionale Verweise.
    rubriken:
      heading: "Service"
      items:
        - { name: "RSS",         url: "/index.xml" }
        - { name: "Datenschutz", url: "/datenschutz/" }
        - { name: "Impressum",   url: "/impressum/" }

    # Spalte 3 — Link-Liste.
    anderswo:
      heading: "Welten"
      items:
        - { name: "Hexxen 1733",        url: "https://fvtt1.online-resources.de/" }
        - { name: "Dungeons & Dragons", url: "https://fvtt2.online-resources.de/" }
        - { name: "Fallout",            url: "https://fvtt2.online-resources.de/" }

  # ----------------------------------------------------------------------------
  # Claim — Standard-Side-Text neben jeder Seitenüberschrift.
  # Verwendet sowohl im Hero-Side auf der Startseite als auch im Page-Header-Side,
  # wenn keine seitenspezifische Variante in `pageHeaders` gesetzt ist.
  # HTML-Tags wie <em> und <br/> sind erlaubt.
  # ----------------------------------------------------------------------------
  claim: 'Berichte aus <em>Aventurien</em> und <em>Faerûn</em>,<br/>von teilweise fragwürdigen Quellen.'

  # ----------------------------------------------------------------------------
  # Page-Header-Side-Texte pro Seite. Schlüssel ist die URL ohne führenden/
  # abschließenden Slash (z.B. `blog`, `archiv`, `blog/dsa`).
  #
  # Cascade in `partials/page-header.html`:
  #   1. Front-Matter `headerSide:` (höchste Priorität, pro-Seite-Override)
  #   2. Eintrag in `pageHeaders` (zentrale Konfiguration hier)
  #   3. `claim` (globaler Default)
  #
  # Leerzeilen / fehlende Schlüssel fallen automatisch auf `claim` zurück.
  # HTML-Tags wie <em> und <br/> sind erlaubt.
  # ----------------------------------------------------------------------------
  pageHeaders:
    blog:       'Neun Jahre <em>Spielberichte</em> und Werkstattgespräche, durchsuchbar nach Regelwerk.'
    archiv:     'Chronologisches Verzeichnis aller Beiträge — nach <em>Jahr</em> und <em>Monat</em> geordnet.'
    categories: '<em>Werkkanon</em> nach Welt sortiert.'
    tags:       'Schlagworte und <em>Streifzüge</em>.'
    about:      'Wer hier schreibt — und warum.'
    search:     'Volltextsuche durch alle Berichte.'

  # ----------------------------------------------------------------------------
  # Home-Texte (Section-Head über dem 3-Spalten-Raster)
  # HTML-Tags wie <em> und <br/> sind erlaubt.
  # ----------------------------------------------------------------------------
  home:
    recent:
      # Section-Head über dem 3-Spalten-Raster: "{title} {em} {suffix}"
      title: "Jüngst"
      em: "hinzugekommen"
      suffix: ""

  socialIcons:
    - name: twitter
      url: "https://twitter.com/hnsstrk"
    - name: mastodon
      url: "https://mastodon.social/@hnsstrk"
    - name: reddit
      url: "https://www.reddit.com/user/hnsstrk"
    - name: twitch
      url: "https://www.twitch.tv/hnsstrk"
    - name: instagram
      url: "https://www.instagram.com/hnsstrk/"
    - name: github
      url: "https://github.com/hnsstrk"
    - name: youtube
      url: "https://www.youtube.com/hnsstrk"
    - name: discord
      url: "https://discord.gg/QuhEw6YZ"
    - name: linkedin
      url: "https://www.linkedin.com/in/hnsstrk/"
    - name: rss
      url: "https://online-resources.de/index.xml"

outputs:
  home:
    - HTML
    - RSS
    - JSON # is necessary

menu:
  main:
    - identifier: blog
      name: "Blog"
      url: /blog/
      weight: 10
    - identifier: archiv
      name: "Archiv"
      url: /archiv/
      weight: 20
    - identifier: categories
      name: "Kategorien"
      url: /categories/
      weight: 15
    - identifier: tags
      name: "Tags"
      url: /tags/
      weight: 30
    - identifier: about
      name: "Über"
      url: /about/
      weight: 40
    - identifier: search
      name: "Suche"
      url: /search/
      weight: 50

  # Footer-Spalten werden in params.footer konfiguriert (siehe oben),
  # nicht mehr als Hugo-Menüs.
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai
